<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupo Dunorte — Madeiras e Móveis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ══════════════ CABEÇALHO ══════════════ -->
  <header class="cabecalho">
    <!-- Camadas de textura/profundidade -->
    <div class="cab-bg-layer1"></div>
    <div class="cab-bg-layer2"></div>
    <div class="cab-grain"></div>

    <div class="cab-inner">
      <!-- Logo com círculo branco -->
      <div class="cab-logo-wrap">
        <div class="cab-logo-3d">
          <div class="cab-logo-circulo">
            <img src="assets/img/logo.png" alt="Grupo Dunorte" class="cab-logo-img"
              onerror="this.parentElement.style.background='#f0c060'">
          </div>
          <div class="cab-logo-reflexo"></div>
        </div>
      </div>

      <!-- Texto central -->
      <div class="cab-centro">
        <h1 class="cab-titulo">Grupo Dunorte</h1>
        <div class="cab-subtitulo">Madeiras &amp; Móveis</div>
        <div class="cab-linha-ouro"></div>
        <p class="cab-slogan">Referência em móveis de madeira maciça de qualidade</p>
      </div>

      <!-- Contato -->
      <div class="cab-contato">
        <a href="tel:+553497724000" class="cab-tel">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.95a16 16 0 0 0 6 6l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16.92z"/></svg>
          (34) 9 9772-4000
        </a>
        <a href="https://wa.me/553497724000" class="cab-wpp" target="_blank">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          WhatsApp
        </a>
      </div>
    </div>
  </header>

  <main class="pagina">

    <!-- Sidebar de filtros -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-topo">
        <span class="sidebar-titulo">Filtros</span>
        <button class="btn-limpar-filtros" id="btnLimparFiltros">Limpar</button>
      </div>

      <div class="filtro-bloco">
        <input type="text" id="buscaNome" class="input-busca" placeholder="Buscar produto…">
      </div>

      <div class="filtro-bloco">
        <div class="filtro-label">Categoria</div>
        <div id="filtroCategoria" class="filtro-checks"></div>
      </div>

      <div class="filtro-bloco">
        <div class="filtro-label">Madeira</div>
        <div id="filtroMadeira" class="filtro-checks"></div>
      </div>

      <div class="filtro-bloco">
        <div class="filtro-label">Tipo de pé</div>
        <div id="filtroTipoPe" class="filtro-checks"></div>
      </div>

      <div class="filtro-bloco">
        <div class="filtro-label">Promoção</div>
        <label class="check-item">
          <input type="checkbox" id="filtroPromo">
          <span class="check-box"></span>
          <span>Somente em oferta</span>
        </label>
      </div>

      <div class="filtro-bloco">
        <div class="filtro-label">Preço (R$)</div>
        <div class="range-duplo">
          <input type="number" id="precoMin" placeholder="Mín">
          <span>—</span>
          <input type="number" id="precoMax" placeholder="Máx">
        </div>
      </div>

      <div class="filtro-bloco">
        <div class="filtro-label">Comprimento (cm)</div>
        <div class="range-duplo">
          <input type="number" id="comprimentoMin" placeholder="Mín">
          <span>—</span>
          <input type="number" id="comprimentoMax" placeholder="Máx">
        </div>
      </div>

      <div class="filtro-bloco">
        <div class="filtro-label">Largura (cm)</div>
        <div class="range-duplo">
          <input type="number" id="larguraMin" placeholder="Mín">
          <span>—</span>
          <input type="number" id="larguraMax" placeholder="Máx">
        </div>
      </div>

      <div class="filtro-bloco">
        <div class="filtro-label">Espessura (cm)</div>
        <div class="range-duplo">
          <input type="number" id="espessuraMin" placeholder="Mín">
          <span>—</span>
          <input type="number" id="espessuraMax" placeholder="Máx">
        </div>
      </div>
    </aside>

    <!-- Conteúdo principal -->
    <section class="conteudo">
      <div class="barra-topo">
        <div class="barra-esq">
          <button class="btn-toggle-filtros" id="btnToggleFiltros" onclick="toggleSidebar()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="14" y2="18"/></svg>
            Filtros
          </button>
          <span id="contadorProdutos" class="contador">—</span>
        </div>
        <div class="barra-dir">
          <select id="ordenarProdutos" class="select-ordenar">
            <option value="recentes">Mais recentes</option>
            <option value="preco-menor">Menor preço</option>
            <option value="preco-maior">Maior preço</option>
            <option value="promo">Maior desconto</option>
          </select>
        </div>
      </div>

      <div id="listaProdutos" class="grid-produtos"></div>
    </section>
  </main>

  <!-- Modal -->
  <div id="modalProduto" class="modal" role="dialog" aria-modal="true">
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal-box">
      <button id="fecharModal" class="btn-fechar" aria-label="Fechar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div id="modalConteudo"></div>
    </div>
  </div>

  <footer class="rodape">
    <div class="rodape-inner">
      <div class="rodape-marca">Grupo Dunorte</div>
      <div class="rodape-info">Patos de Minas &amp; Campina Verde — MG</div>
      <div class="rodape-contato">
        <a href="https://wa.me/553497724000" target="_blank">(34) 9 9772-4000</a>
      </div>
    </div>
  </footer>

  <script src="script_github.js"></script>
</body>
</html>
